<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit and remove Elemnts</title>
</head>
<body style="background-color: #212121;color:#fff">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage(langName){
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)// Appending 'li' to its parent element. 
    }
    addLanguage('python');
    addLanguage('java')
    /* This way of adding new element is not optimized because,
    while using 'appendChild' we have to traverse the whole tree inorder to append the element.So the number of times the function is called ,the traversal will be happened that many times. */

    //Optimizzed way
    function addOptimizedLang(langName){

        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptimizedLang('golang')

    //Editing the values
    const secondLang = document.querySelector('li:nth-child(2)')
    console.log(secondLang);
    // secondLang.innerHTML = "mojo"//not optimized approach.
    const newli = document.createElement('li')
    newli.textContent = "mojo"
    secondLang.replaceWith(newli)// we had the reference so its better to use replaceWith().

    //editing 1st element
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>TypeScript</li>' // changing the entire outer html.

    //remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()//removing last child

</script>
</html>
