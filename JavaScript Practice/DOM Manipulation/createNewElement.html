<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning</title>
    <style>
        body{
            background-color: #212121;
            color: #fff;
        }
    </style>
</head>
<body>
    
</body>
<script>
    //creating element
    const div = document.createElement('div')
    console.log(div);
    div.className = "main"
    div.id = Math.round(Math.random()*10+1)
    div.setAttribute("title","money")
    div.style.backgroundColor = "green"// this way the values gets overiden so its not prefered way
    div.padding ="12px"
    // div.innerHTML="Ice & Tea"

    // Prefered way
    const addTxt = document.createTextNode("Milkyway galxy.")
    div.appendChild(addTxt)
    //attaching to document
    document.body.appendChild(div)

</script>
</html>
