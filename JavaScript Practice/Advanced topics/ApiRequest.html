<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Api request</title>
</head>
<body style = "background-color: #212121;">
    
<!-- Value State	   Description
0	:  UNSENT	:   Client has been created. open() not called yet.
1	:  OPENED	:  open() has been called.
2	:  HEADERS_RECEIVED :	send() has been called, and headers and status are available.
3	:  LOADING	 :  Downloading; responseText holds partial data.
4	:  DONE	     : The operation is complete. -->
</body>
<script>
    // This is Ajax request,older style.
    const requestUrl = "https://api.github.com/users/hiteshchoudhary"
    const xhr = new XMLHttpRequest()
    //"open() sends the request"
    xhr.open('GET',requestUrl)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState); // 2,3,4
        
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText) // it converts string to json type.
            // console.log(typeof data);//string
            console.log(data.followers);//undefined cz its of string data type.
            //52583
        }
    }
    
    xhr.send()//This calls the open()

</script>

</html>
